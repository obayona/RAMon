services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file: .env
    ports:
      - "5433:5432"  # Use 5433 on host to avoid conflict with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override DB_HOST to use docker service name instead of localhost
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/app/backend/entrypoint.sh"]
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    develop:
      watch:
        # Sync backend source code changes
        - action: sync
          path: ./backend/src
          target: /app/backend/src
        # Sync migrations
        - action: sync
          path: ./backend/migrations
          target: /app/backend/migrations
        # Sync chatbot package changes  
        - action: sync
          path: ./chatbot/chatbot
          target: /app/chatbot/chatbot
        # Rebuild on requirements change
        - action: rebuild
          path: ./backend/requirements.txt
        # Sync index.html for UI changes
        - action: sync
          path: ./backend/index.html
          target: /app/backend/index.html

  # Load products from fixtures/ (no API calls, uses pre-computed embeddings)
  # Usage: docker compose run --rm fixtures-load
  fixtures-load:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/backend/fixtures
    command: ["python", "load_fixture.py"]
    profiles:
      - fixtures

volumes:
  postgres_data:

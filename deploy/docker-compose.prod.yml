services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file: ../backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    env_file: ../backend/.env
    environment:
      DB_HOST: postgres
      LOG_FORMAT: json
      LOG_DIR: /var/log/ramon
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/bash
      - /app/backend/entrypoint.sh
      - gunicorn
      - src.main:app
      - --worker-class
      - uvicorn.workers.UvicornWorker
      - --workers
      - "2"
      - --bind
      - 0.0.0.0:8000
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
      - --capture-output
    volumes:
      - log_data:/var/log/ramon
    expose:
      - "8000"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    # Run manually: docker compose -f docker-compose.prod.yml run --rm certbot certonly --webroot -w /var/www/certbot -d ${DOMAIN}
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - certbot

  # One-time fixtures loader for production
  # Usage: docker compose -f docker-compose.prod.yml run --rm fixtures-load
  fixtures-load:
    build:
      context: ..
      dockerfile: backend/Dockerfile.prod
    env_file: ../backend/.env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/backend/fixtures
    command: ["python", "load_fixture.py"]
    networks:
      - backend
    profiles:
      - fixtures

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  log_data:
